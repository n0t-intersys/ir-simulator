<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Incident Response Simulator</title>
<style>
:root {
  --bg: #0a0f1e; --surface: #111a2e; --surface-2: #16203a; --border: #1f2a44;
  --text: #e2e8f0; --muted: #94a3b8; --dim: #64748b; --dimmer: #475569;
  --cyan: #22d3ee; --accent: #06b6d4;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--text);
  font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  line-height: 1.6; min-height: 100vh;
  background-image: radial-gradient(circle at 50% 0%, rgba(6,182,212,0.06), transparent 60%);
}
.serif { font-family: Georgia, "Times New Roman", serif; }
.wrap { max-width: 1060px; margin: 0 auto; padding: 24px 20px 64px; }

.topbar { display: flex; align-items: center; justify-content: space-between; padding-bottom: 20px; margin-bottom: 28px; border-bottom: 1px solid var(--border); }
.brand { display: flex; align-items: center; gap: 10px; }
.brand-mark { width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center; background: rgba(6,182,212,0.12); border: 1px solid rgba(6,182,212,0.3); color: var(--cyan); font-weight: 700; font-size: 15px; }
.brand-name { font-size: 14px; font-weight: 600; letter-spacing: 0.02em; }
.brand-name span { color: var(--cyan); }
.topbtn { background: none; border: 1px solid var(--border); color: var(--muted); font-size: 12px; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-family: inherit; transition: all 0.2s; }
.topbtn:hover { border-color: var(--dim); color: var(--text); }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
.mb16 { margin-bottom: 16px; }
.fade { animation: fadeUp 0.35s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

/* Select screen */
.intro-head { text-align: center; max-width: 640px; margin: 0 auto 36px; }
.kicker-pill { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; border-radius: 999px; margin-bottom: 22px; }
.dot { width: 8px; height: 8px; border-radius: 50%; animation: pulse 1.8s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
.kicker-pill span { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; }
.intro-head h1 { font-size: 44px; line-height: 1.1; margin-bottom: 14px; }
.intro-lead { color: var(--muted); font-size: 18px; }

.sc-grid { display: grid; grid-template-columns: 1fr; gap: 18px; max-width: 880px; margin: 0 auto; }
@media (min-width: 760px) { .sc-grid { grid-template-columns: 1fr 1fr; } }
.sc-card { text-align: left; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 22px; cursor: pointer; transition: all 0.25s; font-family: inherit; color: var(--text); }
.sc-card:hover { transform: translateY(-3px); border-color: color-mix(in srgb, var(--c) 45%, transparent); box-shadow: 0 0 32px color-mix(in srgb, var(--c) 12%, transparent); }
.sc-card-top { display: flex; justify-content: flex-end; margin-bottom: 8px; }
.sc-diff { font-family: ui-monospace, monospace; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 3px 8px; border-radius: 6px; border: 1px solid; }
.sc-codename { font-family: ui-monospace, monospace; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
.sc-title { font-family: Georgia, serif; font-size: 22px; font-weight: 600; color: #fff; margin-bottom: 8px; }
.sc-blurb { color: var(--muted); font-size: 14px; line-height: 1.55; margin-bottom: 16px; }
.sc-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.sc-tag { font-family: ui-monospace, monospace; font-size: 11px; color: var(--dim); border: 1px solid #1e293b99; background: #0f172a55; border-radius: 5px; padding: 2px 8px; }
.sc-start { font-size: 14px; font-weight: 600; }
.sc-note { text-align: center; color: var(--dimmer); font-size: 12px; margin-top: 26px; }

/* Intro */
.intro { max-width: 660px; margin: 0 auto; text-align: center; }
.backlink { background: none; border: none; color: var(--dim); font-size: 13px; font-family: ui-monospace, monospace; cursor: pointer; margin-bottom: 22px; }
.backlink:hover { color: var(--cyan); }
.intro h1 { font-size: 44px; line-height: 1.1; margin-bottom: 14px; }
.intro-grid { display: grid; grid-template-columns: 1fr; gap: 12px; text-align: left; margin: 28px 0; }
@media (min-width: 560px) { .intro-grid { grid-template-columns: 1fr 1fr; } }
.intro-card { display: flex; gap: 12px; }
.intro-card .it { font-size: 14px; font-weight: 600; }
.intro-card .id { font-size: 12px; color: var(--dim); line-height: 1.5; margin-top: 2px; }
.btn-primary { background: var(--accent); color: var(--bg); font-weight: 600; font-size: 15px; border: none; padding: 14px 32px; border-radius: 10px; cursor: pointer; font-family: inherit; transition: all 0.2s; }
.btn-primary:hover { background: #0891b2; box-shadow: 0 0 24px rgba(6,182,212,0.4); }
.btn-ghost { background: none; border: 1px solid var(--border); color: var(--text); font-weight: 600; font-size: 14px; padding: 13px 24px; border-radius: 10px; cursor: pointer; font-family: inherit; transition: all 0.2s; }
.btn-ghost:hover { border-color: var(--dim); }
.fine { color: var(--dimmer); font-size: 12px; margin-top: 16px; }

/* Play layout */
.layout { display: grid; gap: 22px; grid-template-columns: 1fr; grid-template-areas: "status" "narrative" "hud" "choices"; }
@media (min-width: 900px) { .layout { grid-template-columns: 1fr 300px; grid-template-areas: "status hud" "narrative hud" "choices hud"; align-items: start; } .area-hud { position: sticky; top: 20px; } }
.area-status { grid-area: status; } .area-narrative { grid-area: narrative; } .area-hud { grid-area: hud; } .area-choices { grid-area: choices; }

.status-bar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.status-left { display: flex; align-items: center; gap: 12px; }
.role-badge { font-family: ui-monospace, monospace; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; padding: 6px 12px; border-radius: 8px; border: 1px solid; }
.pips { display: flex; gap: 5px; align-items: center; }
.pip { height: 6px; border-radius: 999px; background: #334155; transition: all 0.3s; }
.pip.on { width: 20px; background: var(--accent); }
.pip.done { width: 6px; background: rgba(6,182,212,0.6); }
.pip.off { width: 6px; }
.clock { font-family: ui-monospace, monospace; font-size: 14px; color: var(--muted); }

.scene-card h2 { font-size: 28px; margin-bottom: 16px; line-height: 1.2; }
.scene-card p { margin-bottom: 14px; } .scene-card p:last-child { margin-bottom: 0; }

.choice { width: 100%; text-align: left; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; cursor: pointer; display: flex; gap: 12px; align-items: flex-start; transition: all 0.2s; margin-bottom: 12px; font-family: inherit; }
.choice:hover { border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.05); }
.choice-num { flex-shrink: 0; margin-top: 1px; width: 22px; height: 22px; border-radius: 6px; border: 1px solid #334155; color: var(--dim); font-size: 11px; font-family: ui-monospace, monospace; display: grid; place-items: center; transition: all 0.2s; }
.choice:hover .choice-num { border-color: var(--accent); color: var(--accent); }
.choice-label { display: block; color: var(--text); font-weight: 500; line-height: 1.4; }
.choice:hover .choice-label { color: #fff; }
.choice-detail { display: block; color: var(--dim); font-size: 14px; margin-top: 4px; }

/* HUD */
.hud { display: flex; flex-direction: column; gap: 16px; }
.hud-title { font-family: ui-monospace, monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--dim); margin-bottom: 10px; }
.hud-sub { border-top: 1px solid var(--border); margin-top: 12px; padding-top: 12px; }
.meter { margin-bottom: 12px; } .meter:last-child { margin-bottom: 0; }
.meter-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.meter-label { font-family: ui-monospace, monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.03em; color: var(--muted); }
.meter-val { font-family: ui-monospace, monospace; font-size: 11px; font-weight: 700; }
.meter-track { height: 6px; border-radius: 999px; background: #1e293b; overflow: hidden; }
.meter-fill { height: 100%; border-radius: 999px; transition: width 0.5s ease; }
.good { color: #34d399; } .good.meter-fill { background: #10b981; }
.mid { color: #fbbf24; } .mid.meter-fill { background: #f59e0b; }
.bad { color: #f87171; } .bad.meter-fill { background: #ef4444; }
.intel-feed { list-style: none; max-height: 260px; overflow-y: auto; padding-right: 4px; }
.intel { font-family: ui-monospace, monospace; font-size: 12px; line-height: 1.5; display: flex; gap: 8px; margin-bottom: 8px; }
.intel .marker { flex-shrink: 0; }
.intel-normal { color: var(--text); } .intel-normal .marker { color: rgba(6,182,212,0.6); }
.intel-unconfirmed { color: rgba(245,158,11,0.7); font-style: italic; } .intel-unconfirmed .marker { color: rgba(245,158,11,0.6); }
.intel-critical { color: #fca5a5; } .intel-critical .marker { color: #ef4444; }

/* After-action */
.aar { max-width: 760px; margin: 0 auto; }
.aar-head { text-align: center; margin-bottom: 32px; }
.aar-tone { font-size: 42px; margin-bottom: 8px; }
.tone-win { color: #34d399; } .tone-mixed { color: #fbbf24; } .tone-loss { color: #f87171; }
.aar-kicker { font-family: ui-monospace, monospace; font-size: 12px; text-transform: uppercase; letter-spacing: 0.16em; color: var(--dim); margin-bottom: 10px; }
.aar-head h2 { font-size: 34px; line-height: 1.15; margin-bottom: 18px; }
.aar-body { text-align: left; max-width: 640px; margin: 0 auto; }
.aar-body p { color: var(--muted); margin-bottom: 12px; }
.grade-row { display: flex; align-items: center; justify-content: space-between; }
.gr-label { font-family: ui-monospace, monospace; font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--dim); margin-bottom: 4px; }
.gr-sub { color: var(--muted); font-size: 14px; }
.grade-letter { font-family: Georgia, serif; font-size: 64px; font-weight: 700; line-height: 1; }
.grade-good { color: #34d399; } .grade-mid { color: #fbbf24; } .grade-bad { color: #f87171; }
.grade-score { font-family: ui-monospace, monospace; font-size: 14px; color: var(--dim); text-align: right; }
.aar-meters { display: grid; grid-template-columns: 1fr; gap: 4px 32px; }
@media (min-width: 560px) { .aar-meters { grid-template-columns: 1fr 1fr; } }
.wl-grid { display: grid; grid-template-columns: 1fr; gap: 16px; margin-bottom: 16px; }
@media (min-width: 560px) { .wl-grid { grid-template-columns: 1fr 1fr; } }
.wl-title { font-family: ui-monospace, monospace; font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 12px; }
.wl-win .wl-title { color: #34d399; } .wl-loss .wl-title { color: #f87171; }
.wl-item { display: flex; gap: 8px; font-size: 14px; color: var(--text); margin-bottom: 8px; line-height: 1.5; }
.wl-item .s { flex-shrink: 0; font-weight: 700; }
.wl-win .s { color: #34d399; } .wl-loss .s { color: #f87171; }
.wl-empty { color: var(--dim); font-style: italic; font-size: 14px; }
.trail-item { display: flex; gap: 12px; font-size: 14px; margin-bottom: 8px; }
.trail-tag { flex-shrink: 0; font-family: ui-monospace, monospace; font-size: 10px; padding: 2px 6px; border-radius: 4px; height: fit-content; margin-top: 2px; }
.trail-choice { color: var(--muted); line-height: 1.5; }
.aar-actions { display: flex; flex-direction: column; gap: 12px; justify-content: center; margin-top: 8px; }
@media (min-width: 560px) { .aar-actions { flex-direction: row; } }
.aar-fine { text-align: center; color: var(--dimmer); font-size: 12px; margin-top: 16px; }

</style>
</head>

  <div class="topbar">
    <div class="brand"><div class="brand-mark">IR</div><div class="brand-name">IR Simulator<span>.</span></div></div>
    <button class="topbtn" id="topBtn" onclick="backToSelect()" style="display:none">Change scenario</button>
  </div>
  <div id="app"></div>
</div>

    if (s.flags.foundActive)

    if (s.flags.disclosedProperly)

    if (s.flags.reinfection)

    if (s.flags.deepened)

    if (s.flags.blindOps && !s.flags.eradicated)

    if (s.flags.concealed)

    if (s.flags.activeIntrusion && !s.flags.foundActive)
        losses.push("There was a live intrusion in your environment that your response did not fully run to ground.");
    if (s.flags.vendorPass)
        losses.push("You accepted the vendor's reassurance and re-extended trust without changing anything.");
    if (avg < 45)
        losses.push("Stakeholder trust eroded between the outage risk and the vendor fight. The next decision will be harder to land.");
    return { delta, wins, losses };
}

function resolveLsEnding(s, disclosure) {
    const sessionOpen = !s.flags.sessionsRevoked;
    const accessed = s.flags.wipedOnly || (sessionOpen && (s.flags.delayed || s.flags.downplayed)) || s.dataExposure >= 60;
    const provable = s.flags.scoped && s.flags.sessionsRevoked && s.dataExposure < 45;

    // Heavy-handed deflection wrecked the room, for a case you cannot even show was warranted.
    if (s.flags.execAlienated && !provable) {
        return "ls_ending_exec_fallout";
    }
    // Hardware wiped, live cloud session left open.
    if (s.flags.wipedOnly && sessionOpen) {
        return "ls_ending_open_session";
    }
    // Real/likely access, and you chose to say nothing.
    if (accessed && disclosure === "none") {
        s.flags.recklessNoDisclosure = true;
        return "ls_ending_public_breach";
    }
    // Declined to notify on an encryption claim you cannot prove.
    if (disclosure === "none" && !provable) {
        return "ls_ending_unprovable";
    }
    // Notified the world for an encrypted, never-accessed device you had already closed out.
    if (s.flags.assumedBreach && s.flags.sessionsRevoked && !accessed && disclosure === "proactive") {
        return "ls_ending_over_notify";
    }
    // Clean: session killed fast, scope evidenced, defensible disclosure, room intact.
    if (provable && disclosure !== "none" && !s.flags.wipedOnly && avgOk(s)) {
        return "ls_ending_textbook";
    }
    return "ls_ending_held_messy";
}
function avgOk(s) {
    return (s.trust.legal + s.trust.eng + s.trust.exec) / 3 >= 48;
}
function scoreAdjust(s) {
    let delta = 0;
    const wins = [];
    const losses = [];
    const avg = (s.trust.legal + s.trust.eng + s.trust.exec) / 3;
    if (s.flags.sessionsRevoked) delta += 8;
    if (s.flags.scoped) delta += 7;
    if (s.flags.evidencePreserved) delta += 3;
    if (s.flags.insurerLooped) delta += 2;
    if (s.flags.wipedOnly) delta -= 8;
    if (s.flags.delayed) delta -= 5;
    if (s.flags.downplayed) delta -= 6;
    if (s.flags.assumedBreach) delta -= 3;
    if (s.flags.execAlienated) delta -= 10;
    if (s.flags.recklessNoDisclosure) delta -= 12;
    if (s.flags.sessionsRevoked) wins.push("You killed the live session fast, closing the real foothold before encryption-at-rest was even relevant.");
    if (s.flags.scoped) wins.push("You scoped the exposure precisely and preserved the evidence the disclosure call rested on.");
    if (s.flags.insurerLooped) wins.push("You engaged breach counsel and the cyber-insurer early, on solid ground.");
    if (s.flags.properDisclosure && !s.flags.assumedBreach) wins.push("You made a defensible disclosure decision and acted on it in time.");
    if (s.flags.wipedOnly) losses.push("You wiped the hardware but left the live cloud session open - the real hole.");
    if (s.flags.delayed) losses.push("You waited to act while a live, authenticated session kept running.");
    if (s.flags.downplayed) losses.push("You leaned on 'it was encrypted' without proving the device was even locked.");
    if (s.flags.execAlienated) losses.push("You torched the executive relationship deflecting blame onto the CFO.");
    if (s.flags.recklessNoDisclosure) losses.push("You declined to notify an exposure you could not prove was contained.");
    if (s.flags.assumedBreach && !s.flags.scoped) losses.push("You notified more broadly than the facts likely required, at real reputational cost.");
    if (avg < 45) losses.push("Stakeholder trust frayed. The next call will be harder to make.");
    return { delta: delta, wins: wins, losses: losses };
}

// ─────────────────────────────── ENGINE ─────────────────────────────────────
// (Mirrors app/ir-simulator/engine.ts; scenario data below is compiled from source.)
function clamp(n) { return Math.max(0, Math.min(100, n)); }

function applyEffect(state, effect) {
  if (!effect) return state;
  const flags = Object.assign({}, state.flags);
  (effect.set || []).forEach((f) => (flags[f] = true));
  (effect.clear || []).forEach((f) => (flags[f] = false));
  const intel = state.intel.slice();
  (effect.intel || []).forEach((l) => { if (!intel.includes(l)) intel.push(l); });
  return {
    scene: state.scene,
    clock: state.clock + (effect.clock || 0),
    caseStrength: clamp(state.caseStrength + (effect.caseStrength || 0)),
    dataExposure: clamp(state.dataExposure + (effect.dataExposure || 0)),
    trust: {
      legal: clamp(state.trust.legal + ((effect.trust && effect.trust.legal) || 0)),
      eng: clamp(state.trust.eng + ((effect.trust && effect.trust.eng) || 0)),
      exec: clamp(state.trust.exec + ((effect.trust && effect.trust.exec) || 0)),
    },
    flags: flags, intel: intel, log: state.log,
  };
}

function enterScene(state, id, scenes) {
  const scene = scenes[id];
  let ns = Object.assign({}, state, { scene: id });
  if (scene.intelReveal) ns = applyEffect(ns, { intel: scene.intelReveal });
  if (scene.onEnter) { const e = scene.onEnter(ns); if (e) ns = applyEffect(ns, e); }
  return ns;
}

function avgTrust(s) { return Math.round((s.trust.legal + s.trust.eng + s.trust.exec) / 3); }
function baseScore(s) { return 0.3 * s.caseStrength + 0.3 * (100 - s.dataExposure) + 0.25 * avgTrust(s); }
function gradeFromScore(score) { return score >= 90 ? "S" : score >= 80 ? "A" : score >= 70 ? "B" : score >= 60 ? "C" : score >= 45 ? "D" : "F"; }
function computeReport(scenario, s) {
  const adj = scenario.scoreAdjust(s);
  const score = clamp(baseScore(s) + adj.delta);
  const grade = gradeFromScore(score);
  const wins = adj.wins.slice(); const losses = adj.losses.slice();
  if (wins.length === 0) wins.push("You reached a resolution, which is more than some incident responders manage.");
  return { score: Math.round(score), grade: grade, wins: wins, losses: losses };
}

function meterHtml(label, value, higherIsBetter) {
  const good = higherIsBetter ? value >= 60 : value <= 35;

  const cls = good ? "good" : mid ? "mid" : "bad";
  return '<div class="meter"><div class="meter-top"><span class="meter-label">' + esc(label) +
    '</span><span class="meter-val ' + cls + '">' + Math.round(value) + '</span></div>' +
    '<div class="meter-track"><div class="meter-fill ' + cls + '" style="width:' + value + '%"></div></div></div>';

function intelLineHtml(text) {
  const unconfirmed = text.indexOf("(unconfirmed)") === 0;
  const critical = /^(FINAL|CONFIRMED|REINFECTION|SECOND|GOOD|BAD|MIXED)/.test(text);
  const clean = text.replace("(unconfirmed) ", "");
  const marker = critical ? "!!" : unconfirmed ? "~" : ">";
  const cls = critical ? "intel-critical" : unconfirmed ? "intel-unconfirmed" : "intel-normal";
  return '<li class="intel ' + cls + '"><span class="marker">' + marker + '</span><span>' + esc(clean) + '</span></li>';
}

  const pips = [];
  for (let i = 1; i <= sc.meta.acts; i++) {
    const cls = i === scene.act ? "pip on" : i < scene.act ? "pip done" : "pip off";
    pips.push('<span class="' + cls + '"></span>');
  }
  const choices = visible.map(function (c, i) {
    return '<button class="choice" onclick="choose(' + i + ')">' +
      '<span class="choice-num">' + (i + 1) + '</span><span>' +
      '<span class="choice-label">' + esc(c.label) + '</span>' +
      (c.detail ? '<span class="choice-detail">' + esc(c.detail) + '</span>' : '') +
      '</span></button>';
  }).join("");
  return '<div class="layout fade">' +
    '<div class="area-status"><div class="status-bar"><div class="status-left">' +
      '<span class="role-badge" style="color:' + rc + ';border-color:' + rc + '4d;background:' + rc + '1a">' + esc(scene.role) + '</span>' +
      '<span class="pips">' + pips.join("") + '</span>' +
    '</div><span class="clock">&#9201; ' + esc(scene.clockLabel) + '</span></div></div>' +
    '<div class="area-narrative"><div class="card scene-card"><h2 class="serif">' + esc(scene.title) + '</h2>' +
      scene.body.map(function (p) { return '<p>' + esc(p) + '</p>'; }).join("") + '</div></div>' +
    '<div class="area-hud">' + hudHtml(s, sc.meterLabels) + '</div>' +
    '<div class="area-choices">' + choices + '</div>' +
  '</div>';
}

function aarHtml(sc, scene, s) {
  const report = computeReport(sc, s);
  const labels = sc.meterLabels;
  const toneSym = scene.endingTone === "win" ? "&#9670;" : scene.endingTone === "mixed" ? "&#9650;" : "&#9760;";
  const toneCls = scene.endingTone === "win" ? "tone-win" : scene.endingTone === "mixed" ? "tone-mixed" : "tone-loss";
  const gradeCls = (report.grade === "S" || report.grade === "A") ? "grade-good" : (report.grade === "B" || report.grade === "C") ? "grade-mid" : "grade-bad";
  const wins = report.wins.map(function (w) { return '<div class="wl-item"><span class="s">+</span><span>' + esc(w) + '</span></div>'; }).join("");
  const losses = report.losses.length
    ? report.losses.map(function (l) { return '<div class="wl-item"><span class="s">-</span><span>' + esc(l) + '</span></div>'; }).join("")
    : '<div class="wl-empty">Remarkably little. Clean work.</div>';
  const trail = s.log.map(function (e) {
    const rc = ROLE_COLOR[e.role];
    return '<div class="trail-item"><span class="trail-tag" style="color:' + rc + ';background:' + rc + '1a">' + ROLE_ABBR[e.role] + '</span><span class="trail-choice">' + esc(e.choice) + '</span></div>';
  }).join("");
  return '<div class="aar fade"><div class="aar-head">' +
    '<div class="aar-tone ' + toneCls + '">' + toneSym + '</div>' +
    '<p class="aar-kicker">' + esc(sc.meta.title) + ' &middot; After-Action Report</p>' +
    '<h2 class="serif">' + esc(scene.endingTitle) + '</h2>' +
    '<div class="aar-body">' + scene.body.map(function (p) { return '<p>' + esc(p) + '</p>'; }).join("") + '</div></div>' +
    '<div class="card mb16"><div class="grade-row"><div><p class="gr-label">Overall Grade</p><p class="gr-sub">Composite of the two situation meters and stakeholder trust.</p></div>' +
      '<div><div class="grade-letter ' + gradeCls + '">' + report.grade + '</div><div class="grade-score">' + report.score + '/100</div></div></div></div>' +
    '<div class="card mb16"><div class="aar-meters">' +
      meterHtml(labels.primary1, s.caseStrength, true) + meterHtml(labels.primary2, s.dataExposure, false) +
      meterHtml(labels.s1, s.trust.legal, true) + meterHtml(labels.s2, s.trust.eng, true) + meterHtml(labels.s3, s.trust.exec, true) +
    '</div></div>' +
    '<div class="wl-grid"><div class="card wl-win"><p class="wl-title">What Went Right</p>' + wins + '</div>' +
      '<div class="card wl-loss"><p class="wl-title">What Hurt</p>' + losses + '</div></div>' +
    '<div class="card mb16"><p class="wl-title" style="color:var(--dim)">Your Decision Trail</p>' + trail + '</div>' +
    '<div class="aar-actions">' +
      '<button class="btn-primary" onclick="replay()">Run it again</button>' +
      '<button class="btn-ghost" onclick="shareResult()" id="shareBtn">Share result</button>' +
      '<button class="btn-ghost" onclick="backToSelect()">Try another scenario</button>' +
    '</div><p class="aar-fine">This is one of seven outcomes for this scenario. The others are reachable from the same opening.</p></div>';
}

// ─────────────────────────────── STATE + RENDER ─────────────────────────────
let scenario = null, started = false, state = null;

function render() {
  const app = document.getElementById("app");
  const topBtn = document.getElementById("topBtn");
  if (!scenario) { app.innerHTML = selectHtml(); topBtn.style.display = "none"; }
  else if (!started || !state) { app.innerHTML = introHtml(scenario); topBtn.style.display = "none"; }
  else {
    const scene = scenario.scenes[state.scene];
    topBtn.style.display = "inline-block";
    app.innerHTML = scene.isEnding ? aarHtml(scenario, scene, state) : playHtml(scenario, scene, state);
    const feed = document.getElementById("intelFeed");
    if (feed) feed.scrollTop = feed.scrollHeight;
  }
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function pickScenario(i) { scenario = SCENARIOS[i]; started = false; state = null; render(); }
function backToSelect() { scenario = null; started = false; state = null; render(); }
function begin() {
  state = enterScene(scenario.initialState(), scenario.firstScene, scenario.scenes);
  started = true; render();
}
function choose(i) {
  const scene = scenario.scenes[state.scene];
  const visible = (scene.choices || []).filter(function (c) { return !c.show || c.show(state); });
  const choice = visible[i];
  if (!choice) return;
  let s = applyEffect(state, choice.effect);
  s = Object.assign({}, s, { log: state.log.concat([{ role: scene.role, choice: choice.label }]) });
  const nextId = typeof choice.next === "function" ? choice.next(s) : choice.next;
  s = enterScene(s, nextId, scenario.scenes);
  state = s; render();
}
function replay() { begin(); }
function shareResult() {
  const scene = scenario.scenes[state.scene];
  const report = computeReport(scenario, state);
  const text = 'I ran "' + scenario.meta.title + '" on the Intersys Incident Response Simulator.\n' +
    'Outcome: ' + scene.endingTitle + '\nGrade: ' + report.grade + ' (' + report.score + '/100)';
  const btn = document.getElementById("shareBtn");
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function () { if (btn) { btn.textContent = "Copied"; setTimeout(function () { btn.textContent = "Share result"; }, 2000); } });
  }
}

// Keyboard: 1-9 select a visible choice during play.
document.addEventListener("keydown", function (e) {
  if (!scenario || !started || !state) return;
  const scene = scenario.scenes[state.scene];
  if (scene.isEnding) return;
  const n = parseInt(e.key, 10);
  if (!Number.isNaN(n) && n >= 1 && n <= 9) {
    const visible = (scene.choices || []).filter(function (c) { return !c.show || c.show(state); });
    if (n <= visible.length) { e.preventDefault(); choose(n - 1); }
  }
});

window.pickScenario = pickScenario;
window.backToSelect = backToSelect;
window.begin = begin;
window.choose = choose;
window.replay = replay;
window.shareResult = shareResult;

render();

</script>
</body>
</html>
